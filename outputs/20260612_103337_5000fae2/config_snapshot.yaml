experiment:
  name: round2_fixes_v2
  version: '1.0'
  seed: 42
datasets:
- name: sst2
  huggingface_id: stanfordnlp/sst2
  split: validation
  sample_size: 3
  labels:
  - negative
  - positive
  text_field: sentence
  secondary_text_field: null
  label_field: label
  description: Stanford Sentiment Treebank (binary classification)
  task_type: sentiment_analysis
- name: mnli
  huggingface_id: nyu-mll/multi_nli
  split: validation_matched
  sample_size: 3
  labels:
  - entailment
  - neutral
  - contradiction
  text_field: premise
  secondary_text_field: hypothesis
  label_field: label
  description: Multi-Genre Natural Language Inference
  task_type: natural_language_inference
- name: ag_news
  huggingface_id: fancyzhx/ag_news
  split: test
  sample_size: 3
  labels:
  - World
  - Sports
  - Business
  - Sci/Tech
  text_field: text
  secondary_text_field: null
  label_field: label
  description: AG News Topic Classification
  task_type: topic_classification
models:
- name: llama-3.1-8b
  groq_model_id: llama-3.1-8b-instant
  description: Meta's Llama 3.1 8B parameter model (via Groq)
  context_window: 8192
  default_temperature: 0
  default_top_p: 1
  supports_function_calling: false
inference:
  temperature: 0
  top_p: 1
  max_tokens: 512
  max_retries: 3
  retry_delay_base: 2
  concurrent_requests: 5
  request_timeout: 30
explanation_strategies:
- id: H
  name: highlighting
  prompt_file: prompts/highlighting.txt
  n_tokens: 3
- id: R
  name: rationale
  prompt_file: prompts/rationale.txt
  n_tokens: null
- id: CF
  name: counterfactual
  prompt_file: prompts/counterfactual.txt
  n_tokens: null
- id: RO
  name: rank_ordering
  prompt_file: prompts/rank_ordering.txt
  n_tokens: 5
normalization:
  version: v1.0
  lowercase: true
  remove_punctuation: true
  remove_stopwords: true
  use_lemmatization: true
  stopword_language: english
  lemmatizer: wordnet
metrics:
  bootstrap_iterations: 1000
  permutation_tests: 10000
  confidence_level: 0.95
  bonferroni_correction: true
validity:
  masking_token: '[MASK]'
  n_random_baseline_trials: 10
ablations:
  prompt_variants: true
  normalization_variants: true
  highlighting_k_values:
  - 2
  - 3
  - 5
  subset_size: 50
output:
  base_dir: outputs
  checkpoint_frequency: 20
  log_level: INFO
  figure_dpi: 300
  figure_formats:
  - pdf
  - png
reproducibility:
  log_git_commit: true
  log_package_versions: true
  save_config_with_results: true
